<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Speed Escape 3D</title>
    <link rel="stylesheet" href="./styles/style.css">
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contact-container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.5);
            border: 2px solid #ff5500;
        }
        h1 {
            color: #ff5500;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        a.email-link {
            color: #00ffff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        a.email-link:hover {
            text-decoration: underline;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: 1px solid #555;
            transition: background-color 0.2s;
        }
        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>Contact Developer</h1>
        <p>For any inquiries, feedback, or support, please email:</p>
        <a href="mailto:isaacapptech23developer@gmail.com" class="email-link">isaacapptech23developer@gmail.com</a>
        <br>
        <a href="index.html" class="back-btn">Back to Game</a>
    </div>
</body>
</html>
